<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Makzik Dashboard Ultra v3.6</title>
    <style>
        :root { --bg: #050505; --panel: #0a0a0a; --border: #1a1a1a; --accent: #5865f2; --text: #ffffff; --subtext: #888888; --card-bg: #0d0d0d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        .sidebar { width: 240px; background: var(--panel); border-right: 1px solid var(--border); padding: 20px 15px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; display: flex; align-items: center; transition: 0.2s; color: var(--subtext); font-size: 14px; gap: 12px; }
        .nav-item svg { width: 18px; height: 18px; fill: currentColor; }
        .nav-item:hover { background: #1a1a1a; color: white; }
        .nav-item.active { background: white; color: black; font-weight: bold; }
        
        .content { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 25px; border-radius: 12px; margin-bottom: 20px; position: relative; }
        
        .action-btn { background: #1a1a1a; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; cursor: pointer; font-size: 14px; margin-top: 10px; transition: 0.3s; width: 100%; font-weight: bold; }
        .action-btn:hover { background: var(--accent); border-color: var(--accent); }
        .action-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        
        textarea, input, select { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 8px; color: white; padding: 12px; box-sizing: border-box; outline: none; margin-top: 10px; }
        
        .page { display: none; }
        .page.active { display: block; }
        
        .list-container { background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 8px; max-height: 350px; overflow-y: auto; font-family: monospace; font-size: 13px; color: #aaa; margin-top: 15px; }
        .list-item { border-bottom: 1px solid var(--border); padding: 12px 0; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .list-item:last-child { border: none; }
        .game-name { color: #fff; font-weight: bold; font-size: 14px; }
        
        #globalStatus { position: fixed; bottom: 20px; right: 20px; font-size: 11px; padding: 8px 15px; border-radius: 20px; background: #161b22; border: 1px solid #30363d; display: none; z-index: 100; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="font-size: 24px; font-weight: 900; color: white; padding-left: 10px; margin-bottom: 30px; letter-spacing: -1px;">MAKZIK</div>
        <div class="nav-item active" onclick="showPage('dashboard', this)">🏠 <span id="nav_dash">Dashboard</span></div>
        <div class="nav-item" onclick="showPage('executor', this)">‹› <span id="nav_exec">Executor</span></div>
        <div class="nav-item" onclick="showPage('scripts_page', this)">📄 <span id="nav_scripts">Script Hub</span></div>
        <div class="nav-item" onclick="showPage('games_page', this)">🎮 <span id="nav_games">Games</span></div>
        <div class="nav-item" onclick="showPage('settings', this)">⚙️ <span id="nav_sett">Settings</span></div>
    </div>

    <div class="content">
        <div class="header">
            <div>
                <h1 id="greeting" style="margin:0; font-size: 32px;">...</h1>
                <p id="sub_welcome" style="color: var(--subtext); margin: 5px 0 0 0;">Aetheris System Active</p>
            </div>
            <div id="clock">00:00:00</div>
        </div>

        <div id="dashboard" class="page active">
            <div class="card" id="subCard" style="border-left: 4px solid #f85149;">
                <div id="t_license" style="color:var(--subtext); font-size: 11px; font-weight: bold; letter-spacing: 1px;">SUBSCRIPTION</div>
                <div id="subStatus" style="font-size: 24px; font-weight: bold; color: #f85149;">🔒 UNAUTHORIZED</div>
            </div>
            <div class="card">
                <div id="t_logs" style="color:var(--subtext); font-size: 11px; font-weight: bold; letter-spacing: 1px; margin-bottom: 10px;">UPDATE LOGS</div>
                <div id="updateLog" style="font-size: 13px; color: #888; white-space: pre-wrap; font-family: monospace;">Loading...</div>
            </div>
        </div>

        <div id="executor" class="page">
            <div class="card" style="position: relative; min-height: 450px;">
                <div id="execLock" class="locked-screen" style="position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; justify-content:center; align-items:center; z-index:10; flex-direction:column;">
                    <h2 style="color:#f85149;">LOCKED</h2>
                    <p style="color:gray;">Redeem key in settings</p>
                </div>
                <h2>Executor</h2>
                <textarea id="execContent" rows="18" placeholder="-- Enter code..."></textarea>
                <button class="action-btn" id="execBtn" onclick="sendToGithub('textlol.txt', 'execContent', false)" disabled>Execute</button>
            </div>
        </div>

        <div id="games_page" class="page">
            <div class="card">
                <h2 id="h_games_title">Game Database</h2>
                <div id="gamesList" class="list-container">Fetching games...</div>
            </div>
        </div>

        <div id="scripts_page" class="page">
            <div class="card">
                <h2>Script Hub</h2>
                <div id="publicScriptsList" class="list-container">Loading...</div>
                <textarea id="publicScriptInput" rows="5" placeholder="Share code..."></textarea>
                <button class="action-btn" onclick="sendToGithub('SCRIPTS', 'publicScriptInput', true)">Publish</button>
            </div>
        </div>

        <div id="settings" class="page">
            <div class="card">
                <h2>Language</h2>
                <select id="langSelect" onchange="changeLang()">
                    <option value="en">English</option><option value="uk">Ukrainian</option>
                </select>
                <h2 style="margin-top: 20px;">License</h2>
                <input type="text" id="licenseKey" placeholder="Key...">
                <button class="action-btn" style="background:var(--accent);" onclick="checkLicense()">Redeem</button>
            </div>
        </div>

        <div id="globalStatus"></div>
    </div>

<script>
const CONFIG = {
    token: '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',
    owner: 'timofejvivdenko-ai',
    repo: 'sfesf'
};

// 1. АВТО-ОЧИЩЕННЯ КОЖНІ 5 СЕКУНД
async function autoClearTextLol() {
    try {
        const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/textlol.txt`;
        const getRes = await fetch(url, { headers: { "Authorization": `token ${CONFIG.token}` } });
        const data = await getRes.json();
        
        await fetch(url, {
            method: 'PUT',
            headers: { "Authorization": `token ${CONFIG.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                message: "Auto Clear",
                content: btoa("     "), // 5 пробілів
                sha: data.sha
            })
        });
        console.log("textlol.txt auto-cleared");
    } catch (e) { console.error("Auto-clear failed", e); }
}
setInterval(autoClearTextLol, 5000);

// 2. ЗАВАНТАЖЕННЯ ІГОР З НАЗВОЮ З URL
async function loadGames() {
    const list = document.getElementById('gamesList');
    try {
        const res = await fetch(`https://raw.githubusercontent.com/timofejvivdenko-ai/sfesf/main/games2432?t=${Date.now()}`);
        const text = await res.text();
        list.innerHTML = "";
        text.split('\n').forEach(line => {
            if(!line.trim()) return;
            const url = line.trim();
            // Витягуємо останню частину URL після /
            const parts = url.split('/');
            const gameName = parts[parts.length - 1] || "Unknown Game";
            
            const div = document.createElement('div');
            div.className = "list-item";
            div.innerHTML = `<span class="game-name">${gameName}</span> 
                             <button onclick="window.open('${url}', '_blank')" style="background:#5865f2; border:none; color:white; padding:6px 15px; border-radius:6px; cursor:pointer; font-weight:bold;">Play</button>`;
            list.appendChild(div);
        });
    } catch (e) { list.innerText = "Error loading games."; }
}

// Стандартні функції (таймер, зміна сторінок, ліцензія)
function updateTime() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString();
    const h = now.getHours();
    document.getElementById('greeting').innerText = (h<12?"Good morning":h<18?"Good day":"Good evening") + ".";
}
setInterval(updateTime, 1000); updateTime();

function showPage(p, el) {
    document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
    document.getElementById(p).classList.add('active');
    el.classList.add('active');
    if(p === 'games_page') loadGames();
}

// Функція відправки на GitHub (для Executor та Scripts)
async function sendToGithub(file, id, append) {
    const text = document.getElementById(id).value;
    if (!text.trim()) return;
    const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${file}`;
    try {
        const get = await fetch(url, { headers: { "Authorization": `token ${CONFIG.token}` } });
        const data = await get.json();
        let content = text;
        if (append) {
            const old = decodeURIComponent(escape(atob(data.content)));
            content = old + "\n\n-- NEW SCRIPT --\n" + text;
        }
        await fetch(url, {
            method: 'PUT',
            headers: { "Authorization": `token ${CONFIG.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Update", content: btoa(unescape(encodeURIComponent(content))), sha: data.sha })
        });
        document.getElementById(id).value = "";
    } catch (e) { alert("Error: " + e.message); }
}

// Перевірка ліцензії (спрощено)
async function checkLicense() {
    const key = document.getElementById('licenseKey').value.trim();
    if (key) {
        document.getElementById('subStatus').innerText = "✅ PREMIUM ACTIVE";
        document.getElementById('subStatus').style.color = "#a371f7";
        document.getElementById('execLock').style.display = "none";
        document.getElementById('execBtn').disabled = false;
    }
}

async function loadLogs() {
    try {
        const res = await fetch(`https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/main/uptadeLOG?t=${Date.now()}`);
        document.getElementById('updateLog').innerText = await res.text();
    } catch (e) { }
}
loadLogs();
</script>
</body>
</html>
