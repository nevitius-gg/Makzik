<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Makzik Dashboard v3.0</title>
    <style>
        :root { --bg: #050505; --panel: #0a0a0a; --border: #1a1a1a; --accent: #5865f2; --text: #ffffff; --subtext: #888888; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; margin: 0; overflow: hidden; }
        .sidebar { width: 240px; background: var(--panel); border-right: 1px solid var(--border); padding: 20px 15px; display: flex; flex-direction: column; }
        .menu-label { font-size: 11px; color: var(--subtext); letter-spacing: 1px; margin: 20px 0 10px 10px; font-weight: bold; }
        .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; display: flex; align-items: center; transition: 0.2s; color: var(--subtext); }
        .nav-item:hover { background: #1a1a1a; color: white; }
        .nav-item.active { background: white; color: black; font-weight: bold; }
        .content { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .welcome h1 { margin: 0; font-size: 32px; font-weight: 700; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 12px; margin-bottom: 20px; }
        .action-btn { background: #1a1a1a; border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; color: white; cursor: pointer; font-size: 14px; margin-top: 10px; transition: 0.3s; width: 100%; font-weight: bold;}
        .action-btn:hover:not(:disabled) { background: var(--accent); }
        .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page { display: none; }
        .page.active { display: block; }
        textarea { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 8px; color: #7ee787; padding: 15px; font-family: monospace; resize: none; box-sizing: border-box; }
        .locked-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 10; border-radius: 12px; flex-direction: column; }
        .public-list { background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 8px; max-height: 250px; overflow-y: auto; font-family: monospace; font-size: 12px; color: #aaa; margin-top: 15px; white-space: pre-wrap; }
        #clock { font-size: 14px; color: var(--subtext); border: 1px solid var(--border); padding: 5px 12px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="font-size: 22px; font-weight: bold; color: white; padding-left: 10px; margin-bottom: 20px;">Makzik</div>
        <div class="nav-item active" onclick="showPage('dashboard', this)">🏠 Dashboard</div>
        <div class="nav-item" onclick="showPage('executor', this)">‹› Executor</div>
        <div class="nav-item" onclick="showPage('scripts_page', this)">📄 Scripts</div>
        <div class="nav-item" onclick="showPage('settings', this)">⚙️ Settings</div>
    </div>

    <div class="content">
        <div class="header">
            <div class="welcome">
                <h1 id="greeting">...</h1>
                <p>Makzik Dashboard Control</p>
            </div>
            <div id="clock">00:00:00</div>
        </div>

        <div id="dashboard" class="page active">
            <div class="card">
                <div style="color:var(--subtext); font-size: 12px; font-weight: bold;">SUBSCRIPTION STATUS</div>
                <div id="subStatus" style="font-size: 24px; font-weight: bold; margin-top: 5px; color: #f85149;">🔒 ACCESS DENIED</div>
            </div>
            <div class="card">
                <div style="color:var(--subtext); font-size: 12px; font-weight: bold;">UPDATE LOG</div>
                <div id="updateLog" style="font-size: 14px; color: #ccc; white-space: pre-wrap; margin-top:10px;">Loading logs...</div>
            </div>
        </div>

        <div id="executor" class="page">
            <div class="card" style="position: relative; min-height: 400px;">
                <div id="execLock" class="locked-screen">
                    <h2 style="color: #f85149;">LOCKED</h2>
                    <p style="color: var(--subtext);">Redeem a key in Settings to use Executor</p>
                </div>
                <h2>Executor</h2>
                <textarea id="execContent" rows="15" placeholder="-- License required to type..."></textarea>
                <button class="action-btn" id="execBtn" onclick="sendToGithub('textlol.txt', 'execContent', false)" disabled>Execute (Locked)</button>
            </div>
        </div>

        <div id="scripts_page" class="page">
            <div class="card">
                <h2>Public Scripts</h2>
                <div id="publicScriptsList" class="public-list">Loading scripts...</div>
                
                <hr style="border: 0.5px solid var(--border); margin: 20px 0;">
                
                <h3>Publish Your Script</h3>
                <textarea id="publicScriptInput" rows="5" placeholder="-- Share something with the community..."></textarea>
                <button class="action-btn" onclick="sendToGithub('SCRIPTS', 'publicScriptInput', true)">Publish to Global List</button>
            </div>
        </div>

        <div id="settings" class="page">
            <div class="card">
                <h2>Settings</h2>
                <label>Redeem License Key:</label>
                <input type="text" id="licenseKey" placeholder="Enter key..." style="width:100%; padding:12px; background:#000; border:1px solid var(--border); color:white; border-radius:8px; margin-top:10px;">
                <button class="action-btn" style="background: var(--accent);" onclick="checkLicense()">Redeem Key</button>
            </div>
        </div>

        <div id="globalStatus" style="position: fixed; bottom: 20px; right: 20px; font-weight: bold;"></div>
    </div>

<script>
let userRank = "none";
const CONFIG = {
    token: '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',
    owner: 'timofejvivdenko-ai',
    repo: 'sfesf'
};

// Годинник і привітання
function updateTime() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString();
    const h = now.getHours();
    let g = h>=5&&h<12 ? "Good morning" : h>=12&&h<18 ? "Good day" : h>=18&&h<24 ? "Good evening" : "GO TO SLEEP";
    document.getElementById('greeting').innerText = g + ".";
}
setInterval(updateTime, 1000); updateTime();

// Перемикання сторінок + завантаження скриптів при переході
function showPage(p, el) {
    document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
    document.getElementById(p).classList.add('active');
    if(el) el.classList.add('active');
    if(p === 'scripts_page') loadPublicScripts();
}

// Завантаження списку публічних скриптів
async function loadPublicScripts() {
    const list = document.getElementById('publicScriptsList');
    try {
        const res = await fetch(`https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/main/SCRIPTS`);
        list.innerText = await res.text();
    } catch (e) { list.innerText = "No scripts found."; }
}

// Перевірка ліцензії
async function checkLicense() {
    const key = document.getElementById('licenseKey').value.trim();
    const sub = document.getElementById('subStatus');
    const lock = document.getElementById('execLock');
    const btn = document.getElementById('execBtn');

    try {
        const [u, s] = await Promise.all([
            fetch(`https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/main/ULTIMATE%20KEYS`),
            fetch(`https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/main/standart`)
        ]);
        const uk = (await u.text()).split('\n').map(x => x.trim());
        const sk = (await s.text()).split('\n').map(x => x.trim());

        if (uk.includes(key)) {
            userRank = "ultimate";
            sub.innerHTML = "⭐ ULTIMATE ACCESS"; sub.style.color = "#a371f7";
            unlockExecutor();
        } else if (sk.includes(key)) {
            userRank = "standard";
            sub.innerHTML = "✅ STANDARD ACCESS"; sub.style.color = "#5865f2";
            unlockExecutor();
        } else { alert("Invalid Key!"); }
    } catch(e) { alert("Server error"); }
}

function unlockExecutor() {
    document.getElementById('execLock').style.display = "none";
    document.getElementById('execBtn').disabled = false;
    document.getElementById('execBtn').innerText = "Update File";
}

// Відправка на GitHub
async function sendToGithub(fileName, areaId, isAppend) {
    const text = document.getElementById(areaId).value;
    const status = document.getElementById('globalStatus');
    
    if (!text.trim()) return;

    status.innerText = "⏳ Processing..."; status.style.color = "gray";
    const URL = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${fileName}`;

    try {
        const getRes = await fetch(URL, { headers: { "Authorization": `Bearer ${CONFIG.token}` } });
        const data = await getRes.json();
        
        let finalContent = text;
        if (isAppend) {
            const oldText = decodeURIComponent(escape(atob(data.content)));
            finalContent = oldText + "\n\n-- NEW SCRIPT BY USER --\n" + text;
        }

        const putRes = await fetch(URL, {
            method: 'PUT',
            headers: { "Authorization": `Bearer ${CONFIG.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Update", content: btoa(unescape(encodeURIComponent(finalContent))), sha: data.sha })
        });

        if (putRes.ok) {
            status.innerText = "✅ Successfully saved!"; status.style.color = "#3fb950";
            document.getElementById(areaId).value = "";
            if(isAppend) loadPublicScripts(); // Оновити список після публікації
        }
    } catch (e) { status.innerText = "❌ Error"; }
}

async function loadLogs() {
    try {
        const res = await fetch(`https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/main/uptadeLOG`);
        document.getElementById('updateLog').innerText = await res.text();
    } catch (e) { }
}
loadLogs();
</script>
</body>
</html>
