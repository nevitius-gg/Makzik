name: Deploy Dashboard
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Inject Token
        run: |
          # Тепер скрипт шукає саме test1.html
          sed -i "s/TOKEN_PLACEHOLDER/${{ secrets.MY_GITHUB_TOKEN }}/g" test1.html
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
