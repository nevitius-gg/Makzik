<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevitius Admin Panel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #2a2a2a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
        }

        h1 {
            color: #00a2ff;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #333;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00a2ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }

        button:hover {
            background-color: #0081cc;
        }

        button:active {
            transform: scale(0.98);
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Admin Control</h1>
        <p>Надіслати команду в Roblox:</p>
        
        <input type="text" id="commandInput" placeholder="Введіть команду (напр. kick)">
        <button onclick="sendCommand()">ВІДПРАВИТИ</button>
        
        <div id="status"></div>
        <div class="footer">Nevitius-GG Server Link</div>
    </div>

    <script>
        // Твоє посилання з Pipedream
        const PIPEDREAM_URL = "https://eoz9gg08mwnhqoh.m.pipedream.net";

        async function sendCommand() {
            const input = document.getElementById('commandInput');
            const status = document.getElementById('status');
            const message = input.value.trim();

            if (!message) {
                status.style.color = "#ff4d4d";
                status.innerText = "❌ Введіть текст!";
                return;
            }

            status.style.color = "#aaa";
            status.innerText = "Відправка...";

            try {
                // Відправляємо дані на Pipedream
                const response = await fetch(PIPEDREAM_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        command: message,
                        time: new Date().toLocaleTimeString()
                    })
                });

                if (response.ok) {
                    status.style.color = "#4dff88";
                    status.innerText = "✅ Команду успішно надіслано!";
                    input.value = ""; // Очистити поле
                } else {
                    status.style.color = "#ff4d4d";
                    status.innerText = "❌ Помилка сервера.";
                }
            } catch (error) {
                status.style.color = "#ff4d4d";
                status.innerText = "❌ Помилка мережі.";
                console.error("Error:", error);
            }
        }
    </script>

</body>
</html>
